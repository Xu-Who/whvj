<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .sparkle span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: sparkle 2s linear infinite;
        }

        @keyframes sparkle {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1);
            }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3.5rem;
            color: #fff;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 20px rgba(255, 255, 255, 0.4),
                0 5px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .game-board {
            background: rgba(187, 173, 160, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            position: relative;
        }

        .cell {
            width: 106px;
            height: 106px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
        }

        .tile {
            position: absolute;
            width: 106px;
            height: 106px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            transition: transform 0.2s ease-in-out, opacity 0.2s ease-in-out;
            animation: appear 0.2s ease-in-out;
        }

        @keyframes appear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tile.merged {
            animation: merge 0.2s ease-in-out;
        }

        @keyframes merge {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1);
            }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.8rem; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.8rem; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.8rem; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.5rem; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.5rem; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.3rem; }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .game-over-content h2 {
            font-size: 2.5rem;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.2rem;
            color: #776e65;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            .score-container {
                gap: 10px;
            }
            .score-box {
                padding: 10px 20px;
            }
            .score-label {
                font-size: 0.75rem;
            }
            .score-value {
                font-size: 1.4rem;
            }
            .cell, .tile {
                width: 70px;
                height: 70px;
                font-size: 1.5rem;
            }
            .tile-128, .tile-256, .tile-512 {
                font-size: 1.3rem;
            }
            .tile-1024, .tile-2048 {
                font-size: 1.1rem;
            }
            .tile-super {
                font-size: 1rem;
            }
            .grid {
                gap: 10px;
            }
            .game-board {
                padding: 10px;
            }
            .controls {
                margin-top: 15px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 2rem;
            }
            .cell, .tile {
                width: 60px;
                height: 60px;
                font-size: 1.3rem;
            }
            .tile-128, .tile-256, .tile-512 {
                font-size: 1.1rem;
            }
            .tile-1024, .tile-2048 {
                font-size: 0.9rem;
            }
            .tile-super {
                font-size: 0.8rem;
            }
            .grid {
                gap: 8px;
            }
            .game-board {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="sparkle" id="sparkles"></div>

    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="game-board">
            <div class="grid" id="grid">
                <!-- 4x4 grid cells -->
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="game.restart()">重新开始</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>游戏结束！</h2>
            <p>最终分数: <span id="finalScore">0</span></p>
            <button class="btn" onclick="game.restart()">再来一局</button>
        </div>
    </div>

    <script>
        // Generate sparkles
        const sparklesContainer = document.getElementById('sparkles');
        function createSparkle() {
            const sparkle = document.createElement('span');
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparklesContainer.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 2000);
        }
        setInterval(createSparkle, 300);

        // 2048 Game Logic
        class Game2048 {
            constructor() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.best = parseInt(localStorage.getItem('best2048')) || 0;
                this.gridElement = document.getElementById('grid');
                this.cellSize = 106;
                this.cellGap = 15;
                this.animating = false;
                this.init();
            }

            init() {
                // Create grid cells
                for (let i = 0; i < 16; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    this.gridElement.appendChild(cell);
                }

                this.addRandomTile();
                this.addRandomTile();
                this.updateDisplay();
                this.setupControls();
                this.updateCellSize();
                window.addEventListener('resize', () => this.updateCellSize());
            }

            updateCellSize() {
                const width = window.innerWidth;
                if (width <= 400) {
                    this.cellSize = 60;
                    this.cellGap = 8;
                } else if (width <= 600) {
                    this.cellSize = 70;
                    this.cellGap = 10;
                } else {
                    this.cellSize = 106;
                    this.cellGap = 15;
                }
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        if (this.grid[r][c] === 0) {
                            emptyCells.push({r, c});
                        }
                    }
                }
                if (emptyCells.length > 0) {
                    const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            updateDisplay() {
                // Clear existing tiles
                const tiles = this.gridElement.querySelectorAll('.tile');
                tiles.forEach(tile => tile.remove());

                // Create new tiles
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        const value = this.grid[r][c];
                        if (value !== 0) {
                            const tile = document.createElement('div');
                            tile.className = `tile tile-${value > 2048 ? 'super' : value}`;
                            tile.textContent = value;
                            const left = c * (this.cellSize + this.cellGap);
                            const top = r * (this.cellSize + this.cellGap);
                            tile.style.transform = `translate(${left}px, ${top}px)`;
                            this.gridElement.appendChild(tile);
                        }
                    }
                }

                document.getElementById('score').textContent = this.score;
                document.getElementById('best').textContent = this.best;
            }

            move(direction) {
                if (this.animating) return;

                let moved = false;
                const oldGrid = JSON.stringify(this.grid);
                const newGrid = this.grid.map(row => [...row]);

                if (direction === 'left') {
                    for (let r = 0; r < 4; r++) {
                        const row = newGrid[r].filter(val => val !== 0);
                        const merged = [];
                        for (let i = 0; i < row.length; i++) {
                            if (i < row.length - 1 && row[i] === row[i + 1] && !merged[i]) {
                                row[i] *= 2;
                                this.score += row[i];
                                row.splice(i + 1, 1);
                                merged[i] = true;
                            }
                        }
                        while (row.length < 4) row.push(0);
                        newGrid[r] = row;
                    }
                } else if (direction === 'right') {
                    for (let r = 0; r < 4; r++) {
                        const row = newGrid[r].filter(val => val !== 0);
                        const merged = [];
                        for (let i = row.length - 1; i >= 0; i--) {
                            if (i > 0 && row[i] === row[i - 1] && !merged[i]) {
                                row[i] *= 2;
                                this.score += row[i];
                                row.splice(i - 1, 1);
                                merged[i] = true;
                                i--;
                            }
                        }
                        while (row.length < 4) row.unshift(0);
                        newGrid[r] = row;
                    }
                } else if (direction === 'up') {
                    for (let c = 0; c < 4; c++) {
                        const col = [];
                        for (let r = 0; r < 4; r++) {
                            if (newGrid[r][c] !== 0) col.push(newGrid[r][c]);
                        }
                        const merged = [];
                        for (let i = 0; i < col.length; i++) {
                            if (i < col.length - 1 && col[i] === col[i + 1] && !merged[i]) {
                                col[i] *= 2;
                                this.score += col[i];
                                col.splice(i + 1, 1);
                                merged[i] = true;
                            }
                        }
                        while (col.length < 4) col.push(0);
                        for (let r = 0; r < 4; r++) {
                            newGrid[r][c] = col[r];
                        }
                    }
                } else if (direction === 'down') {
                    for (let c = 0; c < 4; c++) {
                        const col = [];
                        for (let r = 0; r < 4; r++) {
                            if (newGrid[r][c] !== 0) col.push(newGrid[r][c]);
                        }
                        const merged = [];
                        for (let i = col.length - 1; i >= 0; i--) {
                            if (i > 0 && col[i] === col[i - 1] && !merged[i]) {
                                col[i] *= 2;
                                this.score += col[i];
                                col.splice(i - 1, 1);
                                merged[i] = true;
                                i--;
                            }
                        }
                        while (col.length < 4) col.unshift(0);
                        for (let r = 0; r < 4; r++) {
                            newGrid[r][c] = col[r];
                        }
                    }
                }

                moved = oldGrid !== JSON.stringify(newGrid);

                if (moved) {
                    this.animating = true;
                    this.grid = newGrid;
                    this.updateDisplay();

                    setTimeout(() => {
                        this.addRandomTile();
                        this.updateDisplay();
                        this.animating = false;

                        if (this.score > this.best) {
                            this.best = this.score;
                            localStorage.setItem('best2048', this.best);
                            this.updateDisplay();
                        }

                        if (this.isGameOver()) {
                            document.getElementById('finalScore').textContent = this.score;
                            document.getElementById('gameOver').classList.add('show');
                        }
                    }, 200);
                }
            }

            isGameOver() {
                // Check for empty cells
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        if (this.grid[r][c] === 0) return false;
                    }
                }

                // Check for possible merges
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        const current = this.grid[r][c];
                        if ((c < 3 && current === this.grid[r][c + 1]) ||
                            (r < 3 && current === this.grid[r + 1][c])) {
                            return false;
                        }
                    }
                }

                return true;
            }

            setupControls() {
                // Keyboard controls
                document.addEventListener('keydown', (e) => {
                    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                        e.preventDefault();
                        if (e.key === 'ArrowLeft') this.move('left');
                        else if (e.key === 'ArrowRight') this.move('right');
                        else if (e.key === 'ArrowUp') this.move('up');
                        else if (e.key === 'ArrowDown') this.move('down');
                    }
                });

                // Touch controls
                let touchStartX = 0;
                let touchStartY = 0;
                let touchEndX = 0;
                let touchEndY = 0;

                this.gridElement.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });

                this.gridElement.addEventListener('touchmove', (e) => {
                    touchEndX = e.touches[0].clientX;
                    touchEndY = e.touches[0].clientY;
                }, { passive: true });

                this.gridElement.addEventListener('touchend', (e) => {
                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;
                    const minSwipeDistance = 30;

                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (Math.abs(dx) > minSwipeDistance) {
                            if (dx > 0) this.move('right');
                            else this.move('left');
                        }
                    } else {
                        if (Math.abs(dy) > minSwipeDistance) {
                            if (dy > 0) this.move('down');
                            else this.move('up');
                        }
                    }
                }, { passive: true });
            }

            restart() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.addRandomTile();
                this.addRandomTile();
                this.updateDisplay();
                document.getElementById('gameOver').classList.remove('show');
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
